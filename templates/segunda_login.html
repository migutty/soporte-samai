<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Segunda Instancia</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #0b1220, #060914);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .container {
            background: rgba(20, 24, 35, 0.95);
            padding: 45px 35px;
            border-radius: 18px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(148, 163, 184, 0.15);
        }

        .icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .badge {
            display: inline-block;
            padding: 6px 14px;
            border: 1px solid #3b82f6;
            color: #60a5fa;
            border-radius: 999px;
            font-size: 12px;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        h1 {
            margin: 0;
            font-size: 26px;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #cbd5e1;
            font-size: 14px;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        .info {
            background: #111827;
            padding: 12px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 20px;
            color: #94a3b8;
        }

        input {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid #2b3242;
            background: #0f1219;
            color: white;
            font-size: 15px;
            margin-bottom: 15px;
            text-align: center;
        }

        input:focus {
            border-color: #3b82f6;
            outline: none;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.3);
        }

        .error {
            background: #dc2626;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .footer {
            margin-top: 18px;
            font-size: 12px;
            color: #64748b;
        }
    </style>

</head>

<body>

    <div class="container">

        <div class="icon">🔐</div>

        <div class="badge">Acceso restringido</div>

        <h1>Segunda Instancia</h1>

        <div class="subtitle">
            Acceso exclusivo para secretarías de los juzgados administrativos
        </div>

        <div class="info">
            Ingrese la clave institucional para continuar al formulario interno
        </div>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <input type="password" name="clave" placeholder="Ingrese la clave de acceso" required>

            <button type="submit">Ingresar</button>
        </form>

        <div class="footer">
            Sistema de Soporte SAMAI · Uso interno
        </div>

    </div>

</body>

</html>
