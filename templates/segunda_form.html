<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Segunda Instancia</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0b1220;
            color: white;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            background: #111827;
            padding: 30px;
            border-radius: 15px;
        }

        h1 {
            color: #60a5fa;
            text-align: center;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: none;
            background: #1f2937;
            color: white;
        }

        button {
            width: 100%;
            padding: 15px;
            background: #2563eb;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
        }

        .success {
            background: #16a34a;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 8px;
            text-align: center;
        }
    </style>

</head>

<body>

    <div class="container">

        <h1>Formulario Segunda Instancia</h1>

        {% if success %}
        <div class="success">Formulario enviado correctamente</div>
        {% endif %}

        <form method="POST">

            <input name="nombre" placeholder="Nombre" required>
            <input name="despacho" placeholder="Despacho" required>
            <input name="proceso" placeholder="Número de proceso" required>

            <select name="tipo_actuacion" required>
                <option value="">Tipo de actuación</option>
                <option>Apelación</option>
                <option>Consulta</option>
                <option>Remisión</option>
            </select>

            <input name="demandante" placeholder="Demandante">
            <input name="demandado" placeholder="Demandado">
            <input name="correo" placeholder="Correo">
            <input name="link_expediente" placeholder="Link expediente" required>

            <textarea name="observaciones" placeholder="Observaciones"></textarea>

            <button type="submit">Enviar</button>

        </form>

    </div>

</body>

</html>
